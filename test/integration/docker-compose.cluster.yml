# Redis Cluster integration test stack: 6 nodes (3 masters + 3 replicas)
# in a single docker bridge network with static IPs. The static IPs let
# the test client construct a `natMap` that translates each node's docker-
# internal IP back to the corresponding host port mapping; without natMap,
# the client running on the host cannot follow MOVED redirects because the
# cluster announces its internal bridge IPs.
#
# Inter-node gossip uses the bridge network directly (no port publishing
# needed for the cluster bus port 16379 - clients only talk to 6379).

services:
  redis-node-0:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_HOST_PORT_BASE:-57000}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  redis-node-1:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_NODE_1_PORT:-57001}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  redis-node-2:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_NODE_2_PORT:-57002}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.12
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  redis-node-3:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_NODE_3_PORT:-57003}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.13
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  redis-node-4:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_NODE_4_PORT:-57004}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.14
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  redis-node-5:
    image: redis:7.4-alpine
    command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000",
              "--appendonly", "no", "--save", ""]
    ports:
      - "${INTEGRATION_REDIS_CLUSTER_NODE_5_PORT:-57005}:6379"
    networks:
      cluster:
        ipv4_address: 172.30.0.15
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  # One-shot cluster create. Waits for all 6 nodes to be healthy, then runs
  # `redis-cli --cluster create` with --cluster-replicas 1 (3 masters + 3
  # replicas). --cluster-yes skips the interactive confirm.
  cluster-init:
    image: redis:7.4-alpine
    depends_on:
      redis-node-0:
        condition: service_healthy
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
    networks:
      - cluster
    command:
      - sh
      - -c
      - |
        redis-cli --cluster create \
          172.30.0.10:6379 \
          172.30.0.11:6379 \
          172.30.0.12:6379 \
          172.30.0.13:6379 \
          172.30.0.14:6379 \
          172.30.0.15:6379 \
          --cluster-replicas 1 \
          --cluster-yes
    restart: "no"

networks:
  cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
