services:
  redis:
    # Redis 7.4+ required for the per-field hash TTL primitive (HEXPIRE family)
    # used by createPresence. Pinning to the 7.4 minor avoids drift if the
    # 7-alpine tag floats to a future major. Bump to redis:8-alpine when we
    # adopt Redis 8 features (e.g. JSON, vector search).
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${INTEGRATION_REDIS_HOST_PORT:-56379}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "${INTEGRATION_POSTGRES_HOST_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s
